name: CI

# Run the unit-test suite on every push and pull request.
on:
  push:
  pull_request:

jobs:
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: "**/requirements*.txt"

      - name: Install test dependencies
        # Only lightweight libs are needed: the heavy GPU/service deps (torch,
        # FlagEmbedding, qdrant-client, transformers, etc.) are imported lazily,
        # and the live-service integration tests are excluded from collection
        # via tests/integration/conftest.py — so CI stays fast.
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pydantic-settings python-dotenv pymupdf numpy pytest

      - name: Syntax check (byte-compile all modules)
        run: python -m compileall -q config.py core ingest retrieval llm api scripts tests

      - name: Run unit tests
        run: python -m pytest tests -q
