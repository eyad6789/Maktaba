# Reference nginx site config for the Maktabah RAG deployment.
# The live config on the VPS is based on this; it is NOT loaded from the repo.
#
# Key points for the SPA + streaming upgrade:
#   * /chat/stream needs buffering OFF (SSE) and a long read timeout (the
#     local CPU model can take minutes to finish an answer).
#   * /upload needs a large client_max_body_size (app caps uploads at 200 MB)
#     and request buffering OFF so big PDFs stream straight to the API.
#   * The X-API-Key check stays at this layer; the SPA sends the header on
#     every call (bootstrapped via ?api_key=... -> localStorage).

server {
    listen 8085;
    server_name _;

    # ---- shared auth snippet -------------------------------------------------
    # Replace CHANGE_ME with the real key (or use a map/include).
    set $rag_key_ok 0;
    if ($http_x_api_key = "CHANGE_ME") {
        set $rag_key_ok 1;
    }

    # Uploads up to the app's 200 MB cap (a little headroom for multipart).
    client_max_body_size 250m;

    # The SPA shell and assets are public (the API behind them is not).
    location = / {
        proxy_pass http://127.0.0.1:8100;
    }

    location /assets/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_cache_valid 200 1h;
    }

    # SSE streaming: no buffering, long timeouts.
    location /chat/stream {
        if ($rag_key_ok = 0) { return 401; }
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Large uploads: stream the body through instead of buffering to disk.
    location /upload {
        if ($rag_key_ok = 0) { return 401; }
        proxy_pass http://127.0.0.1:8100;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # Everything else (API + SPA client routes like /dashboard, /c/<id>).
    location / {
        # Allow the SPA shell for client-side routes without a key; the data
        # calls they make are themselves key-checked. Tighten if preferred.
        proxy_pass http://127.0.0.1:8100;
    }

    # Key-checked API endpoints.
    location ~ ^/(chat|query|ingest|conversations|books|jobs|models|status)($|/) {
        if ($rag_key_ok = 0) { return 401; }
        proxy_pass http://127.0.0.1:8100;
        proxy_read_timeout 600s;
    }
}
